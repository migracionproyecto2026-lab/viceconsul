<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — Viceconsulado Honorario de España</title>
  <link rel="icon" type="image/png" href="/images/LogoPng.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rojo: #AA151B;
      --rojo-oscuro: #8B1016;
      --dorado: #F8CE46;
      --fondo: #FAFAF7;
      --borde: #e8e5df;
      --texto: #1a1a1a;
      --gris: #555;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--fondo);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
    }

    /* Logo + título */
    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand img {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--dorado);
      box-shadow: 0 4px 20px rgba(170,21,27,.18);
      margin-bottom: 16px;
    }
    .login-brand h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.15rem;
      color: var(--texto);
      line-height: 1.4;
    }
    .login-brand p {
      font-size: .85rem;
      color: var(--gris);
      margin-top: 4px;
    }

    /* Tarjeta */
    .login-card {
      background: #fff;
      border: 1px solid var(--borde);
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 4px 32px rgba(0,0,0,.07);
    }

    .login-card h2 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.1rem;
      color: var(--rojo);
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--borde);
    }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--gris);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--borde);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--texto);
      background: var(--fondo);
      outline: none;
      transition: border-color .2s;
      margin-bottom: 18px;
    }
    input:focus { border-color: var(--rojo); background: #fff; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--rojo);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover { background: var(--rojo-oscuro); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .65; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .88rem;
      margin-bottom: 18px;
    }

    /* Franja dorada inferior */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: .78rem;
      color: var(--gris);
    }

    @media (max-width: 480px) {
      .login-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">

    <div class="login-brand">
      <img src="/images/LogoPng.png" alt="Escudo del Consulado" onerror="this.src='/images/Logo.jpeg'">
      <h1>Viceconsulado Honorario de España</h1>
      <p>Porlamar, Nueva Esparta — Panel de Gestión</p>
    </div>

    <div class="login-card">
      <h2>Acceso al sistema</h2>
      <div class="error-msg" id="error-msg"></div>
      <form id="login-form" autocomplete="on">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="usuario@consulado.es" required autofocus>
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
        <button type="submit" class="btn-login" id="btn-login">
          <span id="btn-text">Entrar</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </form>
    </div>

    <p class="login-footer">Sistema de gestión interno · Solo personal autorizado</p>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('btn-login')
      const spinner = document.getElementById('spinner')
      const errDiv = document.getElementById('error-msg')
      btn.disabled = true
      spinner.style.display = 'block'
      errDiv.style.display = 'none'

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
          })
        })
        const data = await res.json()
        if (!res.ok) {
          errDiv.textContent = data.error || 'Error al iniciar sesión'
          errDiv.style.display = 'block'
        } else {
          window.location.href = data.redirect || '/admin'
        }
      } catch {
        errDiv.textContent = 'Error de conexión. Verifica que el servidor esté activo.'
        errDiv.style.display = 'block'
      } finally {
        btn.disabled = false
        spinner.style.display = 'none'
      }
    })
  </script>
</body>
</html>
